<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — Smart Placement Tracker</title>
  {% include "_theme_init.html" %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>

  {% include "_navbar.html" %}
  {% include "_flashes.html" %}

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="text-center mb-4">
        <span class="section-eyebrow">Welcome back</span>
        <h3 class="mt-1 mb-0">Log in to your dashboard</h3>
      </div>

      <form method="POST" action="{{ url_for('login') }}" novalidate>
        <div class="mb-3">
          <label class="form-label" for="email">Email address</label>
          <input type="email" class="form-control" id="email" name="email" placeholder="you@college.edu" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">Password</label>
          <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remember" name="remember">
            <label class="form-check-label small text-muted" for="remember">Remember me</label>
          </div>
        </div>
        <button type="submit" class="btn btn-spt-primary w-100 py-2">Log in</button>
<hr class="my-3">

<a href="/login/google" class="btn btn-danger w-100 mb-2">
    <i class="bi bi-google"></i> Continue with Google
</a>

<a href="/login/github" class="btn btn-dark w-100 mb-2">
    <i class="bi bi-github"></i> Continue with GitHub
</a>

<a href="/login/microsoft" class="btn btn-primary w-100 mb-2">
    <i class="bi bi-microsoft"></i> Continue with Microsoft
</a>

<a href="/login/linkedin" class="btn btn-info w-100">
    <i class="bi bi-linkedin"></i> Continue with LinkedIn
</a>
      </form>

      <p class="text-center text-muted small mt-4 mb-0">
        Don't have an account? <a href="{{ url_for('register') }}" class="fw-semibold">Create one</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
