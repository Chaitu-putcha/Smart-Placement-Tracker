<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — Smart Placement Tracker</title>
  {% include "_theme_init.html" %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/oauth.css') }}" rel="stylesheet">
</head>
<body>

  {% include "_navbar.html" %}
  {% include "_flashes.html" %}

  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="text-center mb-4">
        <span class="section-eyebrow">Welcome back</span>
        <h3 class="mt-1 mb-0">Log in to your dashboard</h3>
      </div>

      <form method="POST" action="{{ url_for('login') }}" novalidate>
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label class="form-label" for="email">Email address</label>
          <input type="email" class="form-control" id="email" name="email"
                 placeholder="you@college.edu" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">Password</label>
          <input type="password" class="form-control" id="password" name="password"
                 placeholder="••••••••" required>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remember" name="remember">
            <label class="form-check-label small text-muted" for="remember">Remember me</label>
          </div>
        </div>
        <button type="submit" class="btn btn-spt-primary w-100 py-2">Log in</button>
      </form>

      <div class="oauth-divider my-3">
        <span>or continue with</span>
      </div>

      <div class="d-grid gap-2">
        <a href="{{ url_for('google_login') }}" class="btn btn-oauth btn-oauth-google">
          <svg width="18" height="18" viewBox="0 0 48 48" class="me-2"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.96 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Continue with Google
        </a>
        <a href="{{ url_for('github_login') }}" class="btn btn-oauth btn-oauth-github">
          <i class="bi bi-github me-2"></i> Continue with GitHub
        </a>
        <a href="{{ url_for('microsoft_login') }}" class="btn btn-oauth btn-oauth-microsoft">
          <svg width="18" height="18" viewBox="0 0 21 21" class="me-2"><rect x="1" y="1" width="9" height="9" fill="#F25022"/><rect x="11" y="1" width="9" height="9" fill="#7FBA00"/><rect x="1" y="11" width="9" height="9" fill="#00A4EF"/><rect x="11" y="11" width="9" height="9" fill="#FFB900"/></svg>
          Continue with Microsoft
        </a>
        <a href="{{ url_for('linkedin_login') }}" class="btn btn-oauth btn-oauth-linkedin">
          <i class="bi bi-linkedin me-2"></i> Continue with LinkedIn
        </a>
      </div>

      <p class="text-center text-muted small mt-4 mb-0">
        Don't have an account? <a href="{{ url_for('register') }}" class="fw-semibold">Create one</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
