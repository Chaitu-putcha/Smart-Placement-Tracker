<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create account — Smart Placement Tracker</title>
  {% include "_theme_init.html" %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>

  {% include "_navbar.html" %}
  {% include "_flashes.html" %}

  <div class="auth-wrapper">
    <div class="auth-card" style="max-width: 560px;">
      <div class="text-center mb-4">
        <span class="section-eyebrow">Get started</span>
        <h3 class="mt-1 mb-0">Create your student account</h3>
      </div>

      <form method="POST" action="{{ url_for('register') }}" novalidate>
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label" for="full_name">Full name</label>
            <input type="text" class="form-control" id="full_name" name="full_name"
                   value="{{ form.full_name or '' }}" placeholder="Eg. Priya Sharma" required>
          </div>
          <div class="col-12">
            <label class="form-label" for="email">Email address</label>
            <input type="email" class="form-control" id="email" name="email"
                   value="{{ form.email or '' }}" placeholder="you@college.edu" required>
          </div>
          <div class="col-md-6">
            <label class="form-label" for="password">Password</label>
            <input type="password" class="form-control" id="password" name="password"
                   placeholder="Min. 6 characters" required>
          </div>
          <div class="col-md-6">
            <label class="form-label" for="confirm_password">Confirm password</label>
            <input type="password" class="form-control" id="confirm_password"
                   name="confirm_password" placeholder="Re-enter password" required>
          </div>
          <div class="col-md-4">
            <label class="form-label" for="branch">Branch</label>
            <select class="form-select" id="branch" name="branch">
              {% for b in ['CSE', 'IT', 'ECE', 'EEE', 'MECH', 'CIVIL', 'AI&DS', 'AI&ML', 'Other'] %}
                <option value="{{ b }}" {% if form.branch == b %}selected{% endif %}>{{ b }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label" for="year">Year</label>
            <select class="form-select" id="year" name="year">
              {% for y in ['1st Year', '2nd Year', '3rd Year', 'Final Year'] %}
                <option value="{{ y }}" {% if form.year == y %}selected{% endif %}>{{ y }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label" for="cgpa">CGPA</label>
            <input type="number" class="form-control" id="cgpa" name="cgpa"
                   step="0.01" min="0" max="10"
                   value="{{ form.cgpa or '' }}" placeholder="Eg. 8.4">
          </div>
          <div class="col-12">
            <label class="form-label" for="phone">Phone number</label>
            <input type="tel" class="form-control" id="phone" name="phone"
                   value="{{ form.phone or '' }}" placeholder="10-digit mobile number">
          </div>
        </div>
        <button type="submit" class="btn btn-spt-primary w-100 py-2 mt-4">Create account</button>
      </form>

      <p class="text-center text-muted small mt-4 mb-0">
        Already have an account? <a href="{{ url_for('login') }}" class="fw-semibold">Log in</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
